<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Resultados del Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--surface:#111827;--surface-2:#1a2236;
  --border:rgba(99,130,255,0.12);
  --accent:#3b82f6;--emerald:#10b981;--rose:#f43f5e;--amber:#f59e0b;
  --text:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;
}
html{font-size:16px}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;
}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}

.bg-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 30%,rgba(59,130,246,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 70%,rgba(16,185,129,0.04) 0%,transparent 70%);
}

.container{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;padding:2rem 1.25rem;
}

.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:2rem;flex-wrap:wrap;gap:1rem;
}
.header h1{font-size:1.5rem;font-weight:700}
.header-meta{display:flex;align-items:center;gap:1.5rem}
.live-badge{
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.35rem 0.75rem;border-radius:2rem;
  background:rgba(16,185,129,0.1);
  border:1px solid rgba(16,185,129,0.2);
  font-size:0.75rem;font-weight:500;color:var(--emerald);
}
.live-badge .dot{
  width:7px;height:7px;border-radius:50%;background:var(--emerald);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
.count-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;
  color:var(--text-secondary);
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;margin-bottom:2rem;
}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:1rem;padding:1.25rem 1.5rem;
}
.stat-label{font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.5rem}
.stat-value{
  font-family:'Space Grotesk',sans-serif;
  font-size:2rem;font-weight:700;
  font-variant-numeric:tabular-nums;
}
.stat-value.emerald{color:var(--emerald)}
.stat-value.amber{color:var(--amber)}
.stat-value.accent{color:var(--accent)}

.questions-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:1rem;margin-bottom:2rem;
}
.q-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:1rem;padding:1.5rem;
}
.q-card-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;
  margin-bottom:1.25rem;
}
.q-card-title{font-size:0.95rem;line-height:1.4}
.q-card-num{
  font-size:0.7rem;font-weight:600;color:var(--accent);
  text-transform:uppercase;letter-spacing:0.1em;
  white-space:nowrap;flex-shrink:0;
}

.bar-chart{display:flex;flex-direction:column;gap:0.6rem}
.bar-row{display:flex;align-items:center;gap:0.75rem}
.bar-letter{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:0.375rem;
  background:rgba(255,255,255,0.05);
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.8rem;
  color:var(--text-secondary);flex-shrink:0;
}
.bar-letter.correct{background:rgba(16,185,129,0.15);color:var(--emerald)}
.bar-wrap{flex:1;position:relative;height:28px;border-radius:0.375rem;background:var(--surface-2);overflow:hidden}
.bar-fill{
  height:100%;border-radius:0.375rem;
  transition:width 0.6s cubic-bezier(0.16,1,0.3,1);
  min-width:0;
}
.bar-fill.correct-bar{background:linear-gradient(90deg,rgba(16,185,129,0.4),rgba(16,185,129,0.2))}
.bar-fill.other-bar{background:linear-gradient(90deg,rgba(148,163,184,0.2),rgba(148,163,184,0.08))}
.bar-text{
  position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;font-size:0.75rem;
  color:var(--text-secondary);
}
.bar-label{
  font-size:0.8rem;color:var(--text-secondary);
  min-width:120px;max-width:180px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.table-section h2{font-size:1.1rem;margin-bottom:1rem}
.table-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:1rem;overflow:hidden;
}
table{width:100%;border-collapse:collapse}
th{
  text-align:left;padding:0.75rem 1rem;
  font-size:0.7rem;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;
  border-bottom:1px solid var(--border);
  background:var(--surface-2);
}
td{
  padding:0.75rem 1rem;
  font-size:0.9rem;
  border-bottom:1px solid var(--border);
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,130,246,0.03)}
.score-pill{
  display:inline-flex;align-items:center;
  padding:0.2rem 0.6rem;border-radius:1rem;
  font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:500;
}
.score-high{background:rgba(16,185,129,0.1);color:var(--emerald)}
.score-mid{background:rgba(245,158,11,0.1);color:var(--amber)}
.score-low{background:rgba(244,63,94,0.1);color:var(--rose)}
.answer-cell{
  font-family:'JetBrains Mono',monospace;font-size:0.8rem;
  color:var(--text-secondary);
}
.answer-cell .correct-a{color:var(--emerald);font-weight:500}
.answer-cell .wrong-a{color:var(--rose)}
.empty-state{
  text-align:center;padding:3rem;color:var(--text-muted);
}
.empty-state p{margin-top:0.5rem;font-size:0.9rem}

.refresh-hint{
  text-align:center;margin-top:2rem;
  font-size:0.8rem;color:var(--text-muted);
}

@media(max-width:768px){
  .bar-label{display:none}
  th:nth-child(n+4),td:nth-child(n+4){display:none}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="container">
  <div class="header">
    <h1>Resultados en vivo</h1>
    <div class="header-meta">
      <div class="live-badge"><span class="dot"></span>Auto-refresh 5s</div>
      <div class="count-badge"><span id="totalCount">0</span> respuestas</div>
    </div>
  </div>

  <div class="stats" id="statsContainer">
    <div class="stat-card">
      <div class="stat-label">Participantes</div>
      <div class="stat-value accent" id="statParticipants">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Media de aciertos</div>
      <div class="stat-value emerald" id="statAvg">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mejor puntuacion</div>
      <div class="stat-value emerald" id="statBest">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pregunta mas fallada</div>
      <div class="stat-value amber" id="statHardest">--</div>
    </div>
  </div>

  <div class="questions-grid" id="questionsGrid"></div>

  <div class="table-section">
    <h2>Participantes</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Puntuacion</th>
            <th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th><th>P6</th><th>P7</th>
            <th>Hora</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10" class="empty-state"><p>Esperando respuestas...</p></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="refresh-hint">Los datos se actualizan automaticamente cada 5 segundos</div>
</div>

<script>
const SUPABASE_URL = 'https://bcicjjkgjgajxbrwmeyf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjaWNqamtnamdhanhicndtZXlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxODU3ODIsImV4cCI6MjA4NDc2MTc4Mn0.BqgzIMTWvDIzbx1lofd7ZHYWt3FWjdpWc89kBaQGvrs';

const questions = [
  {q:'Que mide el coeficiente de capital?', options:['Rentabilidad','Liquidez','Solvencia','Tamano'], correct:'C'},
  {q:'Que significa Activos Ponderados por Riesgo?', options:['Activos totales','Nivel de riesgo','Activos liquidos','Activos rentables'], correct:'B'},
  {q:'Que tiene mas riesgo?', options:['Hipotecario','Descubierto','Consumo','Depende'], correct:'D'},
  {q:'Mejor instrumento de capital?', options:['Reservas','Obligacion subordinada','Participacion preferente','Iguales'], correct:'A'},
  {q:'Riesgo que consume capital regulatorio?', options:['Reputacional','Credito','Estrategico','Comercial'], correct:'B'},
  {q:'Riesgo con mas crisis historicas?', options:['Mercado','Operacional','Credito','Liquidez'], correct:'C'},
  {q:'Objetivo del capital regulatorio?', options:['Max beneficios','Reducir costes','Absorber perdidas','Aumentar credito'], correct:'C'}
];
const letters = ['A','B','C','D'];

async function fetchData(){
  try{
    const res = await fetch(SUPABASE_URL+'/rest/v1/quiz_responses?select=*&order=created_at.desc',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const data = await res.json();
    render(data);
  }catch(e){console.error(e)}
}

function render(data){
  const n = data.length;
  document.getElementById('totalCount').textContent = n;
  document.getElementById('statParticipants').textContent = n;

  if(n===0){
    document.getElementById('statAvg').textContent = '--';
    document.getElementById('statBest').textContent = '--';
    document.getElementById('statHardest').textContent = '--';
    document.getElementById('questionsGrid').innerHTML = '';
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="empty-state"><p>Esperando respuestas...</p></td></tr>';
    return;
  }

  const scores = data.map(d=>d.score);
  const avg = (scores.reduce((a,b)=>a+b,0)/n).toFixed(1);
  const best = Math.max(...scores);
  document.getElementById('statAvg').textContent = avg+'/7';
  document.getElementById('statBest').textContent = best+'/7';

  const qStats = questions.map((_,qi)=>{
    const counts = {A:0,B:0,C:0,D:0};
    data.forEach(d=>{
      const ans = d.answers['q'+(qi+1)];
      if(ans && counts[ans]!==undefined) counts[ans]++;
    });
    const correctCount = counts[questions[qi].correct]||0;
    const errorRate = ((n-correctCount)/n*100).toFixed(0);
    return {counts, correctCount, errorRate};
  });

  const hardestIdx = qStats.reduce((worst,q,i)=>
    parseInt(q.errorRate)>parseInt(qStats[worst].errorRate)?i:worst, 0);
  document.getElementById('statHardest').textContent = 'P'+(hardestIdx+1)+' ('+qStats[hardestIdx].errorRate+'% error)';

  const grid = document.getElementById('questionsGrid');
  grid.innerHTML = questions.map((q,i)=>{
    const stats = qStats[i];
    const maxCount = Math.max(...Object.values(stats.counts),1);
    return `
      <div class="q-card">
        <div class="q-card-header">
          <div class="q-card-title">${q.q}</div>
          <div class="q-card-num">P${i+1} &middot; ${stats.correctCount}/${n} ok</div>
        </div>
        <div class="bar-chart">
          ${letters.map((l,li)=>{
            const count = stats.counts[l];
            const pct = n>0?(count/n*100).toFixed(0):0;
            const isCorrect = l===q.correct;
            return `
              <div class="bar-row">
                <span class="bar-letter ${isCorrect?'correct':''}">${l}</span>
                <div class="bar-wrap">
                  <div class="bar-fill ${isCorrect?'correct-bar':'other-bar'}" style="width:${pct}%"></div>
                  <span class="bar-text">${count} (${pct}%)</span>
                </div>
                <span class="bar-label">${q.options[li]}</span>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.map(d=>{
    const scoreCls = d.score>=6?'score-high':d.score>=3?'score-mid':'score-low';
    const time = new Date(d.created_at).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    const answerCells = [1,2,3,4,5,6,7].map(qi=>{
      const ans = d.answers['q'+qi]||'-';
      const isCorrect = ans===questions[qi-1].correct;
      return `<td class="answer-cell"><span class="${isCorrect?'correct-a':'wrong-a'}">${ans}</span></td>`;
    }).join('');
    return `<tr>
      <td><strong>${d.participant_name}</strong></td>
      <td><span class="score-pill ${scoreCls}">${d.score}/7</span></td>
      ${answerCells}
      <td style="color:var(--text-muted);font-size:0.8rem">${time}</td>
    </tr>`;
  }).join('');
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
